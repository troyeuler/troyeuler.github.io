<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Press Start 2P', cursive;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 80%, rgba(255, 105, 180, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(255, 20, 147, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 20px;
        }

        .gif-container {
            margin-bottom: 40px;
            position: relative;
        }

        .gif-container::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120%;
            height: 120%;
            background: linear-gradient(45deg, #ff69b4, #ff1493);
            filter: blur(30px);
            opacity: 0.5;
            z-index: -1;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from {
                opacity: 0.3;
                transform: translate(-50%, -50%) scale(1);
            }
            to {
                opacity: 0.6;
                transform: translate(-50%, -50%) scale(1.1);
            }
        }

        .gif-container img {
            max-width: 100%;
            width: 400px;
            height: auto;
            border: 3px solid #ff69b4;
            box-shadow: 
                0 0 20px #ff69b4,
                0 0 40px rgba(255, 105, 180, 0.5);
        }

        h1 {
            color: #ff69b4;
            font-size: clamp(16px, 4vw, 32px);
            margin-bottom: 30px;
            text-shadow: 
                0 0 10px #ff69b4,
                0 0 20px #ff69b4,
                0 0 40px rgba(255, 105, 180, 0.5);
            animation: flicker 3s infinite;
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            92% { opacity: 1; }
            93% { opacity: 0.8; }
            94% { opacity: 1; }
            95% { opacity: 0.9; }
            96% { opacity: 1; }
        }

        .discord-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 32px;
            background: linear-gradient(135deg, #5865F2 0%, #4752C4 100%);
            color: white;
            text-decoration: none;
            font-size: clamp(10px, 2vw, 14px);
            border: 2px solid #5865F2;
            border-radius: 8px;
            transition: all 0.3s ease;
            box-shadow: 
                0 0 15px rgba(88, 101, 242, 0.4),
                inset 0 0 15px rgba(255, 255, 255, 0.1);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .discord-btn:hover {
            transform: scale(1.05);
            box-shadow: 
                0 0 25px rgba(88, 101, 242, 0.7),
                0 0 50px rgba(88, 101, 242, 0.4),
                inset 0 0 20px rgba(255, 255, 255, 0.2);
            background: linear-gradient(135deg, #6b77f5 0%, #5865F2 100%);
        }

        .discord-btn svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        @media (max-width: 480px) {
            .gif-container img {
                width: 280px;
            }
            
            .discord-btn {
                padding: 12px 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="gif-container">
            <img src="https://imagex1.sx.cdn.live/images/pinporn/2020/05/23/23067767.webp?width=620" alt="Coming Soon">
        </div>
